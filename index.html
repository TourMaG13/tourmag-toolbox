<style>

.sb-nav{flex:1;padding:16px 10px;overflow-y:auto}.sb-section{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(148,163,184,.35);padding:16px 12px 6px;font-weight:600}

.card-cat{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}.card-title{font-family:var(--font-display);font-size:19px;font-weight:700;line-height:1.25;margin-bottom:4px}.card.sz-small .card-title{font-size:16px}.card-sub{font-size:13px;color:var(--text-muted);margin-bottom:8px}.card-desc{font-size:13.5px;color:var(--text-body);line-height:1.6;flex:1}

.kpi-row{display:flex;align-items:center;gap:14px;margin-top:16px;padding:14px 18px;background:var(--border-light);border-radius:var(--radius-xs)}.kpi-val{font-size:30px;font-weight:700;letter-spacing:-1px}.kpi-label{font-size:12px;color:var(--text-muted)}.kpi-trend{margin-left:auto;color:#059669}
.crisis-viz{display:flex;gap:14px;margin-top:16px;flex-wrap:wrap}.crisis-stat{flex:1;min-width:100px;padding:14px;background:#FEF2F2;border-radius:var(--radius-xs);border-left:3px solid #DC2626}.crisis-stat-val{font-size:22px;font-weight:700;color:#DC2626}.crisis-stat-label{font-size:11px;color:#991B1B;margin-top:2px}.crisis-sparkline{flex:2;min-width:160px;padding:14px;background:#FFF7ED;border-radius:var(--radius-xs);display:flex;align-items:flex-end;gap:3px;border-left:3px solid #EA580C}.spark-bar{flex:1;background:linear-gradient(to top,#FDBA74,#F97316);border-radius:3px 3px 0 0;min-width:8px}
.rubrique-articles{margin-top:14px;display:flex;flex-direction:column;gap:8px}.rubrique-link{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--border-light);border-radius:var(--radius-xs);font-size:13px;color:var(--accent);font-weight:500;text-decoration:none;transition:all .2s;cursor:pointer}.rubrique-link:hover{background:var(--accent-light)}.rubrique-link-img{width:52px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--border)}.rubrique-link-text{flex:1;line-height:1.35}
.rub-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}.rub-grid-item{display:flex;flex-direction:column;border-radius:var(--radius-xs);overflow:hidden;background:var(--border-light);text-decoration:none;color:inherit;transition:all .2s}.rub-grid-item:hover{background:var(--accent-light);transform:translateY(-2px)}.rub-grid-img{width:100%;height:100px;object-fit:cover}.rub-grid-title{font-size:13px;font-weight:600;padding:10px 12px 4px;line-height:1.3}.rub-grid-desc{font-size:11px;color:var(--text-muted);padding:0 12px 10px;line-height:1.4}
.rub-carousel{display:flex;gap:12px;margin-top:14px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding-bottom:8px}.rub-carousel::-webkit-scrollbar{height:4px}.rub-carousel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}.rub-carousel-item{flex:0 0 200px;scroll-snap-align:start;border-radius:var(--radius-xs);overflow:hidden;background:var(--border-light);text-decoration:none;color:inherit;transition:transform .2s}.rub-carousel-item:hover{transform:scale(1.03)}.rub-carousel-img{width:100%;height:110px;object-fit:cover}.rub-carousel-title{font-size:12px;font-weight:600;padding:8px 10px;line-height:1.3}
.card.link-all-card{background:var(--border-light);border-style:dashed;display:flex;align-items:center;justify-content:center;min-height:60px}.link-all-inner{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;color:var(--accent)}
.expert-block{margin-bottom:8px}.expert-header{display:flex;align-items:center;gap:16px;margin-bottom:12px}.expert-avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--border);background:var(--border-light);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--accent);overflow:hidden}.expert-avatar img{width:100%;height:100%;object-fit:cover}.expert-name{font-size:16px;font-weight:700}.expert-role{font-size:12px;color:var(--text-muted)}.expert-articles{display:flex;flex-direction:column;gap:8px}.expert-article{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--border-light);border-radius:var(--radius-xs);cursor:pointer;transition:all .2s;text-decoration:none;color:inherit}.expert-article:hover{background:var(--accent-light)}.expert-article-img{width:72px;height:54px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--border)}.expert-article-title{font-size:13px;font-weight:500;line-height:1.35;flex:1}.expert-all-link{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:13px;color:var(--accent);font-weight:600;text-decoration:none}.expert-all-link:hover{text-decoration:underline}
.expert-featured-wrap{margin-bottom:12px;border-radius:var(--radius-xs);overflow:hidden;border:1px solid var(--accent);background:var(--accent-light)}.expert-featured-img{width:100%;height:160px;object-fit:cover;display:block}.expert-featured-body{padding:12px 14px}.expert-featured-title{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--accent);line-height:1.3;margin-bottom:4px}.expert-featured-desc{font-size:12.5px;color:var(--text-body);line-height:1.5}
.fiche-grid{display:flex;flex-direction:column;gap:0;margin-top:16px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid #E8E0D4}.fiche-section{border-bottom:1px solid #E8E0D4;transition:all .3s;background:#FDFBF7}.fiche-section:last-child{border-bottom:none}.fiche-section-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;transition:all .2s}.fiche-section-header:hover{background:#F5F0E8}.fiche-section-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.fiche-section-icon svg{stroke:#fff}.fiche-section-title{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;flex:1}.fiche-section-chevron{width:20px;height:20px;color:#94A3B8;transition:transform .3s ease;flex-shrink:0}.fiche-section.open .fiche-section-chevron{transform:rotate(180deg)}.fiche-section-content{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1),padding .3s;padding:0 18px;font-size:13px;color:var(--text-body);line-height:1.75}.fiche-section.open .fiche-section-content{max-height:800px;padding:0 18px 16px}.fiche-section-content ul{list-style:none;padding:0;margin:0}.fiche-section-content li{padding:5px 0 5px 20px;position:relative;border-bottom:1px dashed #E8E0D4}.fiche-section-content li:last-child{border-bottom:none}.fiche-section-content li::before{content:'';position:absolute;left:0;top:12px;width:8px;height:8px;border-radius:50%;border:2px solid currentColor;opacity:.4}.fiche-section-content .fiche-sub{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#64748B;margin:10px 0 4px;padding-top:6px}.fiche-carnet-header{display:flex;align-items:center;gap:14px;margin-bottom:12px;padding-bottom:12px;border-bottom:2px dashed #D4C9B8}.fiche-carnet-flag{font-size:28px;line-height:1}.fiche-carnet-title{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--text-dark)}.fiche-carnet-sub{font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:1px;text-transform:uppercase}.focus-tag{display:inline-block;padding:4px 14px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}.focus-title{font-family:var(--font-display);font-size:26px;font-weight:800;margin-bottom:6px}
.ai-wrap{display:flex;flex-direction:column;margin-top:8px}.ai-msgs{overflow-y:auto;display:flex;flex-direction:column;gap:8px;max-height:260px}.ai-input-row{margin-top:auto;padding-top:10px}.ai-msg{padding:12px 16px;border-radius:14px;font-size:13px;line-height:1.6;max-width:88%;animation:msgSlide .25s ease;word-wrap:break-word}@keyframes msgSlide{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.ai-msg.bot{background:var(--accent-light);align-self:flex-start;border:1px solid #CFFAFE}.ai-msg.user{background:var(--accent);color:#fff;align-self:flex-end}.ai-msg.loading{color:var(--text-muted);font-style:italic;align-self:flex-start}.ai-input-row{display:flex;gap:10px}.ai-input{flex:1;padding:12px 16px;border-radius:var(--radius-sm);background:var(--bg);border:1px solid var(--border);font-size:14px;font-family:var(--font-body);outline:none;transition:border .2s}.ai-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(8,145,178,.1)}.ai-send{padding:12px 20px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;border:none;cursor:pointer;font-weight:600;font-size:14px;font-family:var(--font-body);transition:all .2s;display:flex;align-items:center;gap:8px;white-space:nowrap}.ai-send:hover{background:#0E7490}.ai-send:disabled{opacity:.4;cursor:not-allowed}

.dataviz-canvas{width:100%;max-height:280px}

/* Fiche destination modal — immersive redesign */
.fiche-modal-bg{position:fixed;inset:0;background:rgba(10,15,25,.75);z-index:1000;display:none;justify-content:center;align-items:flex-start;padding:0;overflow-y:auto;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.fiche-modal-bg.show{display:flex}
.fiche-modal{background:#fff;width:100%;max-width:1100px;overflow:hidden;animation:ficheSlideUp .4s cubic-bezier(.16,1,.3,1);box-shadow:0 25px 80px rgba(0,0,0,.4);min-height:100vh}
@keyframes ficheSlideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.fiche-hero{position:relative;height:420px;background-size:cover;background-position:center;display:flex;align-items:flex-end}
.fiche-hero-overlay{position:absolute;inset:0;background:linear-gradient(170deg,rgba(0,0,0,.1) 0%,rgba(0,0,0,.25) 40%,rgba(0,0,0,.8) 100%)}
.fiche-hero-content{position:relative;z-index:1;padding:40px 48px 44px;color:#fff;width:100%}
.fiche-hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:30px;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;border:1px solid rgba(255,255,255,.2)}
.fiche-hero-flag{width:28px;height:20px;border-radius:3px;object-fit:cover;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.fiche-hero-title{font-family:'Playfair Display',var(--font-display),Georgia,serif;font-size:52px;font-weight:800;letter-spacing:-1.5px;text-shadow:0 3px 12px rgba(0,0,0,.4);line-height:1.1}
.fiche-hero-title em{font-style:italic;color:#67E8F9}
.fiche-hero-sub{font-size:16px;opacity:.85;margin-top:10px;font-weight:300;max-width:600px;line-height:1.5}
.fiche-close{position:fixed;top:20px;right:20px;z-index:1002;width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all .25s;backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.1)}.fiche-close:hover{background:rgba(0,0,0,.8);transform:scale(1.1)}
.fiche-modal-body{padding:0 48px 60px;max-width:1000px;margin:0 auto}
/* Essentials trio */
.fiche-essentials{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:-50px 48px 0;position:relative;z-index:2}
.fiche-essential{border-radius:16px;padding:24px 22px 20px;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.08);border:1px solid #E2E8F0;transition:all .3s;position:relative;overflow:hidden}
.fiche-essential:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.12)}
.fiche-essential-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.fiche-essential-icon svg{width:20px;height:20px}
.fiche-essential-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.fiche-essential-title{font-family:var(--font-display);font-size:22px;font-weight:800;line-height:1.2;margin-bottom:6px}
.fiche-essential-desc{font-size:13px;color:#64748B;line-height:1.55}
.fiche-essential-deco{position:absolute;top:10px;right:10px;font-size:48px;opacity:.06;font-weight:800}
/* Summary */
.fiche-summary{font-size:16px;line-height:1.8;color:#57534E;font-style:italic;border-left:4px solid;padding:20px 24px;margin:40px 0 36px;background:linear-gradient(90deg,rgba(8,145,178,.04),transparent);border-radius:0 12px 12px 0}
/* Photo mosaic */
.fiche-mosaic{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:160px 160px;gap:10px;margin:36px 0;border-radius:16px;overflow:hidden}
.fiche-mosaic-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}.fiche-mosaic-img:hover{transform:scale(1.05)}
.fiche-mosaic>div:first-child{grid-row:span 2}
.fiche-mosaic>div{overflow:hidden;border-radius:4px;position:relative}
/* Section title style */
.fiche-section-divider{text-align:center;margin:48px 0 32px;position:relative}
.fiche-section-divider::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:linear-gradient(90deg,transparent,#E2E8F0 20%,#E2E8F0 80%,transparent)}
.fiche-section-divider-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);background:#fff;padding:0 20px;position:relative}
.fiche-section-divider-title{font-family:'Playfair Display',var(--font-display),serif;font-size:28px;font-weight:700;color:var(--text-dark);margin-top:8px;position:relative}
.fiche-section-divider-line{width:40px;height:3px;background:var(--accent);border-radius:2px;margin:10px auto 0}
/* Sections grid */
.fiche-sections{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.fiche-sect{border-radius:16px;padding:28px 26px;background:#FAFBFC;border:1px solid #E8ECF1;transition:all .3s;position:relative;overflow:hidden}
.fiche-sect:hover{background:#fff;box-shadow:0 6px 20px rgba(0,0,0,.06);border-color:#CBD5E1;transform:translateY(-2px)}
.fiche-sect-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #EEF2F6}
.fiche-sect-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fiche-sect-icon svg{stroke:#fff}
.fiche-sect-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px}
.fiche-sect-num{font-size:36px;font-weight:800;position:absolute;top:12px;right:16px;opacity:.04;font-family:var(--font-display)}
.fiche-sect ul{margin:0;padding:0;list-style:none;font-size:13.5px;line-height:1.75;color:#475569}
.fiche-sect li{margin-bottom:6px;padding:4px 0 4px 20px;position:relative}
.fiche-sect li::before{content:'';position:absolute;left:0;top:11px;width:6px;height:6px;border-radius:50%;background:var(--dot-color,#94A3B8);opacity:.6}
.fiche-sect li.sub-head{font-weight:700;padding-left:0;margin-top:14px;font-size:12.5px;letter-spacing:.5px;text-transform:uppercase;color:#334155}.fiche-sect li.sub-head::before{display:none}
/* News card */
.fiche-news{margin-top:48px;border-radius:16px;padding:28px;background:linear-gradient(135deg,#0C1929 0%,#1A3A52 100%);color:#fff}
.fiche-news-title{font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.fiche-news-list{display:flex;flex-direction:column;gap:10px}
.fiche-news-item{display:flex;gap:14px;align-items:center;padding:12px 16px;background:rgba(255,255,255,.08);border-radius:12px;text-decoration:none;color:#fff;transition:all .2s;border:1px solid rgba(255,255,255,.06)}
.fiche-news-item:hover{background:rgba(255,255,255,.14);transform:translateX(4px)}
.fiche-news-item-img{width:60px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0}
.fiche-news-item-title{font-size:13px;font-weight:500;line-height:1.4;flex:1}
.fiche-news-item-date{font-size:11px;color:rgba(255,255,255,.5);flex-shrink:0}
/* POI numbered cards */
.fiche-poi{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:24px}
.fiche-poi-card{border-radius:14px;padding:20px 18px;background:#fff;border:1px solid #E8ECF1;transition:all .3s;position:relative}
.fiche-poi-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.fiche-poi-num{font-size:28px;font-weight:800;line-height:1;margin-bottom:8px}
.fiche-poi-name{font-weight:700;font-size:14px;line-height:1.3;margin-bottom:6px}
.fiche-poi-desc{font-size:12px;color:#64748B;line-height:1.5}
@media(max-width:900px){.fiche-essentials{grid-template-columns:1fr;margin:-30px 20px 0}.fiche-hero{height:300px}.fiche-hero-title{font-size:36px}.fiche-modal-body{padding:0 20px 40px}.fiche-sections{grid-template-columns:1fr}.fiche-mosaic{grid-template-columns:1fr 1fr;grid-template-rows:140px 140px}.fiche-mosaic>div:first-child{grid-row:span 1}.fiche-poi{grid-template-columns:1fr 1fr}}
/* Dest gallery */
.dest-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;grid-column:1/-1}
.dest-card{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;height:180px;background-size:cover;background-position:center;transition:all .3s}
.dest-card:hover{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.dest-card-overlay{position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.6));display:flex;align-items:flex-end;padding:16px}
.dest-card-name{color:#fff;font-family:var(--font-display);font-size:20px;font-weight:700;text-shadow:0 2px 6px rgba(0,0,0,.3)}
.dest-search{grid-column:1/-1;display:flex;gap:10px;align-items:center;padding:12px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xs)}
.dest-search input{flex:1;border:none;background:none;font-size:14px;outline:none;font-family:inherit;color:var(--text-dark)}
.dest-search-results{grid-column:1/-1;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.dest-mini{border-radius:8px;overflow:hidden;cursor:pointer;height:100px;background-size:cover;background-position:center;position:relative;transition:all .2s}
.dest-mini:hover{transform:scale(1.03)}
.dest-mini-name{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;font-size:12px;font-weight:600;padding:6px 10px}
@media(max-width:768px){.dest-gallery{grid-template-columns:1fr 1fr}.dest-search-results{grid-template-columns:repeat(3,1fr)}}
</style>

<body>
<div class="layout">
  <div class="mobile-bar"><button onclick="toggleSidebar()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><span class="mobile-brand">TourMaG Toolbox</span><div style="width:40px"></div></div>

<div class="fiche-modal-bg" id="fiche-modal-bg" onclick="if(event.target===this)closeFiche()"><div class="fiche-modal" id="fiche-modal"></div></div>
    <main class="main"><div class="page-header"><div class="page-title" id="page-title">La Boîte à Outils du Pro</div><div class="page-desc" id="page-desc">Tous vos outils métier en un seul endroit.</div></div><div class="grid" id="grid"><div class="loading-spinner">Chargement…</div></div></main>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script>
/* ══════════ FIREBASE CONFIG ══════════ */
const firebaseConfig={apiKey:"AIzaSyC560TYrJdVdnfPAYShT49gNbjAjOW-IW0",authDomain:"tourmag-toolbox.firebaseapp.com",projectId:"tourmag-toolbox",storageBucket:"tourmag-toolbox.firebasestorage.app",messagingSenderId:"1054607319758",appId:"1:1054607319758:web:ef97bc82d15ecb1b3ae69f"};
firebase.initializeApp(firebaseConfig);const db=firebase.firestore();

/* ══════════ ICONS ══════════ */
const IC={home:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',map:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>',alert:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',chart:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',book:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',globe:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',users:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',arrow:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>',send:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>',trendUp:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',trendDown:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>',trendFlat:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="15 8 19 12 15 16"/></svg>'};

/* ══════════ CONFIG ══════════ */
const DEFAULT_TABS=[{id:"dashboard",label:"Dashboard",icon:"home"},{id:"cartes",label:"Cartes interactives",icon:"map"},{id:"veille",label:"Veille & Alertes",icon:"alert"},{id:"data",label:"Data & Stats",icon:"chart"},{id:"ressources",label:"Ressources Pro",icon:"book"},{id:"destinations",label:"Destinations",icon:"globe"},{id:"experts",label:"L'œil des experts",icon:"users"}];

const AI_SYS=`Tu es l'assistant IA de TourMaG.com pour les agents de voyages. Réponds en français, sois concis et actionnable. Oriente vers les outils TourMaG quand pertinent.`;

/* ══════════ STATE ══════════ */
let activeTab='dashboard',navTabs=[...DEFAULT_TABS],modules=[],displaySettings={};
let aiMessages=[{role:'bot',text:"Bonjour ! Je suis Léa, l'assistante IA TourMaG. Posez-moi vos questions tourisme pro."}],aiLoading=false;

/* ══════════ FIREBASE ══════════ */
function initFS(){
  db.collection('modules').orderBy('order').onSnapshot(s=>{modules=s.docs.map(d=>({id:d.id,...d.data()}));renderGrid()},e=>console.warn('FS modules err:',e));
  db.collection('config').doc('tabs').onSnapshot(s=>{if(s.exists&&s.data().tabs?.length){navTabs=s.data().tabs;buildSidebar()}},e=>console.warn('FS tabs err:',e));
  db.collection('config').doc('displaySettings').onSnapshot(s=>{if(s.exists){displaySettings=s.data()||{};updateBrand();switchTab(activeTab)}},e=>{});
}

/* ══════════ SIDEBAR ══════════ */
function updateBrand(){
  const logoEl=document.querySelector('.sb-logo');
  if(logoEl){
    if(displaySettings.sidebarLogoUrl){logoEl.innerHTML=`<img src="${displaySettings.sidebarLogoUrl}" style="max-height:${displaySettings.sidebarLogoSize||36}px;max-width:100%;object-fit:contain">`}
    else{logoEl.textContent=displaySettings.sidebarTitle||displaySettings.dashboardTitle||'TourMaG Toolbox'}
  }
  const tag=document.querySelector('.sb-tagline');
  if(tag){
    if(displaySettings.hideSidebarTagline){tag.style.display='none'}
    else{tag.style.display='';tag.textContent=displaySettings.sidebarTagline||displaySettings.dashboardDesc||'Boite a outils pro';if(displaySettings.sidebarTaglineSize)tag.style.fontSize=displaySettings.sidebarTaglineSize+'px'}
  }
  const mBrand=document.querySelector('.mobile-brand');if(mBrand)mBrand.textContent=displaySettings.sidebarTitle||displaySettings.dashboardTitle||'TourMaG Toolbox';
  if(displaySettings.sidebarNavSize)document.querySelectorAll('.sb-item').forEach(el=>el.style.fontSize=displaySettings.sidebarNavSize+'px');
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show')}
function buildSidebar(){document.getElementById('sidebar-nav').innerHTML=navTabs.map(t=>`<button class="sb-item ${activeTab===t.id?'active':''}" onclick="switchTab('${t.id}')">${IC[t.icon]||IC.globe} ${t.label}</button>`).join('')}
function switchTab(id){activeTab=id;buildSidebar();renderGrid();document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');
  const t=navTabs.find(x=>x.id===id);
  const to=(displaySettings.tabOverrides||{})[id]||{};
  const defTitle=id==='dashboard'?(displaySettings.dashboardTitle||'La Bo\u00eete \u00e0 Outils du Pro'):(t?.label||id);
  const defDesc=id==='dashboard'?(displaySettings.dashboardDesc||'Tous vos outils m\u00e9tier en un seul endroit.'):(to.tabDesc||'Retrouvez tous les outils '+(t?.label||id)+'.');
  const el=document.getElementById('page-title');el.textContent=defTitle;
  el.style.fontSize=(to.tabTitleSize||displaySettings.headerTitleSize||'')?(to.tabTitleSize||displaySettings.headerTitleSize)+'px':'';
  el.style.color=to.tabTitleColor||displaySettings.headerTitleColor||'';
  if(displaySettings.headerTitleFont)el.style.fontFamily="'"+displaySettings.headerTitleFont+"',sans-serif";
  const dl=document.getElementById('page-desc');dl.textContent=defDesc;
  dl.style.fontSize=(to.tabDescSize||displaySettings.headerDescSize||'')?(to.tabDescSize||displaySettings.headerDescSize)+'px':'';
  dl.style.color=to.tabDescColor||displaySettings.headerDescColor||'';
}

/* ══════════ TYPOGRAPHY CASCADE: module → tab → global → fallback ══════════ */
function getTypo(m){
  const to=(displaySettings.tabOverrides||{})[activeTab]||{};
  const tf=m.titleFont||to.titleFont||displaySettings.defaultTitleFont||'';
  const fontBase=(f)=>f?`font-family:'${f}',sans-serif;`:'';
  const sizeBase=(s)=>s?`font-size:${s}px;`:'';
  /* Block title */
  const btf=tf; const bts=m.blockTitleSize||to.blockTitleSize||displaySettings.defaultBlockTitleSize||m.titleSize||to.titleSize||displaySettings.defaultTitleSize||'';
  /* Block subtitle */
  const bsf=m.textFont||to.textFont||displaySettings.defaultTextFont||'';
  const bss=m.blockSubtitleSize||to.blockSubtitleSize||displaySettings.defaultBlockSubtitleSize||'';
  /* Block description */
  const bdf=bsf; const bds=m.blockDescSize||to.blockDescSize||displaySettings.defaultBlockDescSize||m.textSize||to.textSize||displaySettings.defaultTextSize||'';
  /* Article title */
  const atf=bsf; const ats=m.articleTitleSize||to.articleTitleSize||displaySettings.defaultArticleTitleSize||'';
  /* Article description (chapô) */
  const adf=bsf; const ads=m.articleDescSize||to.articleDescSize||displaySettings.defaultArticleDescSize||'';
  /* Expert-specific typography */
  const isExpert=(m.type==='expert'||m.type==='experts');
  const expTf=isExpert?(m.titleFont||displaySettings.defaultExpertTitleFont||tf):tf;
  const expTextF=isExpert?(m.textFont||displaySettings.defaultExpertTextFont||bsf):bsf;
  const expNameSz=isExpert?(displaySettings.defaultExpertNameSize||''):'';
  const expTitleSz=isExpert?(displaySettings.defaultExpertTitleSize||bts):bts;
  const expArtTitleSz=isExpert?(displaySettings.defaultExpertArticleTitleSize||ats):ats;
  const expArtDescSz=isExpert?(displaySettings.defaultExpertArticleDescSize||ads):ads;
  return{
    titleStyle:fontBase(isExpert?expTf:btf)+sizeBase(isExpert?expTitleSz:bts),
    subtitleStyle:fontBase(bsf)+sizeBase(bss),
    descStyle:fontBase(isExpert?expTextF:bdf)+sizeBase(isExpert?expTitleSz:bds),
    artTitleStyle:fontBase(isExpert?expTextF:atf)+sizeBase(isExpert?expArtTitleSz:ats),
    artDescStyle:fontBase(isExpert?expTextF:adf)+sizeBase(isExpert?expArtDescSz:ads),
    expertNameStyle:fontBase(expTf)+sizeBase(expNameSz),
    /* legacy compat */
    textStyle:fontBase(bsf)+sizeBase(bds),
    titleFont:tf,titleSize:bts,textFont:bsf,textSize:bds
  };
}
function getTabAccent(){
  const to=(displaySettings.tabOverrides||{})[activeTab]||{};
  return to.accent||displaySettings.defaultAccent||'';
}

/* ══════════ RENDER ══════════ */
function getFiltered(){
  if(activeTab==='dashboard'){return modules.filter(m=>{
    if(m.active===false)return false;
    const cats=m.categories||[m.category];
    return cats.includes('dashboard');
  })}
  return modules.filter(m=>{ 
    if(m.active===false)return false;
    const cats=m.categories||[m.category];
    return cats.includes(activeTab);
  });
}
function renderGrid(){
  const g=document.getElementById('grid');
  let mods=getFiltered().sort((a,b)=>{
    const oa=(a.orders&&a.orders[activeTab]!=null)?a.orders[activeTab]:(a.order||0);
    const ob=(b.orders&&b.orders[activeTab]!=null)?b.orders[activeTab]:(b.order||0);
    return oa-ob;
  });
  if(!mods.length){g.innerHTML='<div class="empty-state">Aucun module dans cette catégorie.</div>';return}
  if(activeTab==='destinations'){
    const fiches=mods.filter(m=>m.type==='focus');
    const others=mods.filter(m=>m.type!=='focus');
    let html='';
    if(others.length)html+=others.map((m,i)=>renderCard(m,i)).join('');
    if(fiches.length){
      html+=`<div class="dest-search"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input placeholder="Rechercher une destination..." oninput="filterDests(this.value)" id="dest-search-input"><span style="font-size:12px;color:var(--text-muted)">${fiches.length} fiches</span></div>`;
      html+=`<div class="dest-gallery" id="dest-gallery">${fiches.sort((a,b)=>(b.generatedAt||'').localeCompare(a.generatedAt||'')).map((m,i)=>renderCard(m,i+others.length)).join('')}</div>`;
      html+=`<div class="dest-search-results" id="dest-results" style="display:none"></div>`;
    }
    g.innerHTML=html;

  } else {
    g.innerHTML=mods.map((m,i)=>renderCard(m,i)).join('');
  }
  if(mods.find(m=>m.type==='ai-chat'))renderAI();
  setTimeout(renderDataviz,100);
  setTimeout(initCarousels,200);
  setTimeout(notifyParentResize,300);
}

/* ══════════ DATAVIZ RENDERING ══════════ */
function renderDataviz(){
  /* Animated counters */
  document.querySelectorAll('.dataviz-counter-val[data-target]').forEach(el=>{
    const target=parseFloat(el.dataset.target.replace(/[^\d.-]/g,''))||0;
    const isInt=Number.isInteger(target);
    const duration=1200;
    const start=performance.now();
    function tick(now){
      const p=Math.min((now-start)/duration,1);
      const ease=1-Math.pow(1-p,3);
      const val=target*ease;
      el.textContent=isInt?Math.round(val).toLocaleString('fr-FR'):val.toFixed(1).replace('.',',');
      if(p<1)requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
  /* Canvas charts */
  document.querySelectorAll('.dataviz-canvas[data-dvtype]').forEach(canvas=>{
    const type=canvas.dataset.dvtype;
    let data=[];
    try{data=JSON.parse(canvas.dataset.dvdata||'[]')}catch(e){}
    if(!data.length)return;
    const ctx=canvas.getContext('2d');
    const W=canvas.width=canvas.parentElement.clientWidth;
    const customH=parseInt(canvas.dataset.dvheight)||0;
    const H=canvas.height=customH||280;
    const valFontSz=parseInt(canvas.dataset.valsize)||12;
    const lblFontSz=parseInt(canvas.dataset.labelsize)||11;
    if(type==='bar')drawBarChart(ctx,data,W,H,valFontSz,lblFontSz);
    else if(type==='pie')drawPieChart(ctx,data,W,H,false);
    else if(type==='donut')drawPieChart(ctx,data,W,H,true);
  });
}

function drawBarChart(ctx,data,W,H,valFontSz,lblFontSz){
  valFontSz=valFontSz||12;lblFontSz=lblFontSz||11;
  const fmtVal=(d)=>{const v=Number.isInteger(d.value)?d.value.toString():d.value.toFixed(1).replace('.',',');return v+(d.suffix||'')};
  ctx.font='11px Outfit,sans-serif';
  const labelH=(lblFontSz+3)*Math.min(Math.ceil(Math.max(...data.map(d=>(d.label||'').length))/16),4)+10;
  const pad={top:28,right:16,bottom:Math.max(labelH,30),left:16};
  const cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  const vals=data.map(d=>d.value);
  const maxVal=Math.max(...vals,0)||1;
  const minVal=Math.min(...vals,0);
  const range=maxVal-minVal||1;
  const zeroY=pad.top+(maxVal/range)*ch;
  const barW=Math.min(cw/data.length*.6,65);
  const gap=(cw-barW*data.length)/(data.length+1);
  data.forEach((d,i)=>{
    const x=pad.left+gap+(barW+gap)*i;
    const barH=Math.abs(d.value/range)*ch;
    const isNeg=d.value<0;
    const y=isNeg?zeroY:zeroY-barH;
    const r=Math.min(barW/2,6);
    ctx.fillStyle=d.color||'#0891B2';
    ctx.beginPath();
    if(isNeg){ctx.moveTo(x,y);ctx.lineTo(x+barW,y);ctx.lineTo(x+barW,y+barH-r);ctx.quadraticCurveTo(x+barW,y+barH,x+barW-r,y+barH);ctx.lineTo(x+r,y+barH);ctx.quadraticCurveTo(x,y+barH,x,y+barH-r);ctx.closePath()}
    else{ctx.moveTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.lineTo(x+barW-r,y);ctx.quadraticCurveTo(x+barW,y,x+barW,y+r);ctx.lineTo(x+barW,y+barH);ctx.lineTo(x,y+barH);ctx.closePath()}
    ctx.fill();
    ctx.fillStyle='#1A2332';ctx.font=`bold ${valFontSz}px Outfit,sans-serif`;ctx.textAlign='center';
    const valStr=fmtVal(d);
    if(isNeg){ctx.textBaseline='bottom';ctx.fillText(valStr,x+barW/2,zeroY-4)}
    else{ctx.textBaseline='bottom';ctx.fillText(valStr,x+barW/2,y-4)}
    ctx.fillStyle='#475569';ctx.font=`${lblFontSz}px Outfit,sans-serif`;ctx.textAlign='center';ctx.textBaseline='top';
    const lbl=d.label||'';const maxLblW=barW+gap-4;const ly=H-pad.bottom+6;
    const words=lbl.split(/\s+/);let line='';let lineY=ly;
    words.forEach((w,wi)=>{
      const test=line?line+' '+w:w;
      if(ctx.measureText(test).width>maxLblW&&line){ctx.fillText(line,x+barW/2,lineY);lineY+=lblFontSz+3;line=w}
      else{line=test}
    });
    if(line)ctx.fillText(line,x+barW/2,lineY);
  });
  ctx.strokeStyle='#CBD5E1';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.left,zeroY);ctx.lineTo(W-pad.right,zeroY);ctx.stroke();
}
function drawPieChart(ctx,data,W,H,isDonut){
  const cx=W/2,cy=H/2-10,r=Math.min(cx,cy)-20;
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  let angle=-Math.PI/2;
  data.forEach(d=>{
    const slice=(d.value/total)*Math.PI*2;
    ctx.fillStyle=d.color||'#0891B2';
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();ctx.fill();
    /* Label */
    const mid=angle+slice/2;
    const lx=cx+Math.cos(mid)*(r*0.65);
    const ly=cy+Math.sin(mid)*(r*0.65);
    ctx.fillStyle='#fff';ctx.font='bold 11px Outfit,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    if(slice>0.3)ctx.fillText(d.label.substring(0,10),lx,ly);
    angle+=slice;
  });
  if(isDonut){
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx,cy,r*0.5,0,Math.PI*2);ctx.fill();
    /* Center total */
    ctx.fillStyle='#1A2332';ctx.font='bold 22px Outfit,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(total.toLocaleString('fr-FR'),cx,cy);
  }
  /* Legend below — wraps to multiple lines if needed */
  ctx.font='11px Outfit,sans-serif';ctx.textBaseline='top';
  let lx=10,ly=H-16;const lineH=16;const maxW=W-20;
  data.forEach(d=>{
    const txt=`${d.label} (${d.value}${d.suffix||''})`;
    const tw=ctx.measureText(txt).width+28;
    if(lx+tw>maxW&&lx>10){lx=10;ly-=lineH}
    ctx.fillStyle=d.color||'#0891B2';ctx.fillRect(lx,ly,10,10);
    ctx.fillStyle='#475569';ctx.textAlign='left';ctx.fillText(txt,lx+14,ly);
    lx+=tw;
  });
}

/* ══════════ CAROUSEL ══════════ */
function goSlide(cId,idx){
  const wrap=document.getElementById(cId);if(!wrap)return;
  wrap.querySelectorAll('.carousel-slide').forEach((s,i)=>{s.classList.toggle('active',i===idx)});
  wrap.querySelectorAll('.carousel-dot').forEach((d,i)=>{d.classList.toggle('active',i===idx)});
  wrap._current=idx;
}
function initCarousels(){
  document.querySelectorAll('.carousel-wrap[data-auto="true"]').forEach(wrap=>{
    const slides=wrap.querySelectorAll('.carousel-slide');
    if(slides.length<2)return;
    const speed=parseInt(wrap.dataset.speed)||4000;
    wrap._current=0;
    if(wrap._timer)clearInterval(wrap._timer);
    wrap._timer=setInterval(()=>{const next=(wrap._current+1)%slides.length;goSlide(wrap.id,next)},speed);
  });
}

    return `<div class="fiche-essential" style="border-top:3px solid ${c}">
      <div class="fiche-essential-deco">${deco}</div>
      <div class="fiche-essential-icon" style="background:${c};color:#fff">${icon}</div>
      <div class="fiche-essential-label" style="color:${c}">${E(s.title).toUpperCase()}</div>
      <div class="fiche-essential-desc">${E(shortContent.substring(0,150))}${shortContent.length>150?'…':''}</div>
    </div>`;
  }).join('');

  /* ═══ PHOTO MOSAIC ═══ */
  const photoQ=encodeURIComponent(country+' travel');
  const mosaicHtml=`<div class="fiche-mosaic">
    <div><img class="fiche-mosaic-img" src="https://source.unsplash.com/600x500/?${photoQ},landmark" alt="${country}"></div>
    <div><img class="fiche-mosaic-img" src="https://source.unsplash.com/400x300/?${photoQ},culture" alt="${country}"></div>
    <div><img class="fiche-mosaic-img" src="https://source.unsplash.com/400x300/?${photoQ},nature" alt="${country}"></div>
    <div><img class="fiche-mosaic-img" src="https://source.unsplash.com/400x300/?${photoQ},food,cuisine" alt="${country}"></div>
    <div><img class="fiche-mosaic-img" src="https://source.unsplash.com/400x300/?${photoQ},people,market" alt="${country}"></div>
  </div>`;

  /* ═══ DETAILED SECTIONS ═══ */
  const detailSects=sections.map((s,si)=>{
    const c=ficheColors[si%ficheColors.length];
    const icon=ficheIcons[si%ficheIcons.length];
    const raw=s.content||'';
    const items=raw.split(/\n|(?:\. (?=[A-Z\u00C0-\u00FF]))/g).filter(l=>l.trim());
    let ul='<ul>';
    items.forEach(l=>{
      const lt=l.trim().replace(/^[\-\u2022\*]\s*/,'');
      if(!lt)return;
      if(lt.endsWith(':')||lt.endsWith(' :')){
        ul+=`<li class="sub-head" style="color:${c}">${E(lt)}</li>`;
      }else{
        ul+=`<li style="--dot-color:${c}"><span>${E(lt)}</span></li>`;
      }
    });
    ul+='</ul>';
    return`<div class="fiche-sect"><div class="fiche-sect-num" style="color:${c}">${String(si+1).padStart(2,'0')}</div><div class="fiche-sect-head"><div class="fiche-sect-icon" style="background:${c}">${icon}</div><div class="fiche-sect-title" style="color:${c}">${E(s.title)}</div></div>${ul}</div>`;
  }).join('');

  /* ═══ NEWS CARD — search for articles matching country ═══ */
  let newsHtml='';
  const countryLower=country.toLowerCase();
  const newsArticles=[];
  modules.forEach(mod=>{
    if(!mod.articles)return;
    mod.articles.forEach(a=>{
      if((a.title||'').toLowerCase().includes(countryLower)||(a.description||'').toLowerCase().includes(countryLower)){
        newsArticles.push(a);
      }
    });
  });
  if(newsArticles.length){
    const newsItems=newsArticles.slice(0,5).map(a=>{
      const dt=a.date?new Date(a.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}):'';
      return `<a class="fiche-news-item" href="${E(a.url)}" target="_blank">${a.image?`<img class="fiche-news-item-img" src="${E(a.image)}" onerror="this.style.display='none'">`:''}<div class="fiche-news-item-title">${E(a.title)}</div>${dt?`<div class="fiche-news-item-date">${dt}</div>`:''}</a>`;
    }).join('');
    newsHtml=`<div class="fiche-news"><div class="fiche-news-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2"/></svg> Dernières actualités — ${E(country)}</div><div class="fiche-news-list">${newsItems}</div></div>`;
  }

  /* ═══ POINTS D'INTÉRÊT as numbered cards ═══ */
  let poiHtml='';
  const poiSection=sections.find(s=>s.title&&s.title.toLowerCase().includes('intérêt'));
  if(poiSection){
    const poiItems=(poiSection.content||'').split(/\n|(?:- )/g).filter(l=>l.trim()&&l.trim().length>3);
    if(poiItems.length>1){
      const poiColors=['#DC2626','#D97706','#059669','#7C3AED','#0891B2','#2563EB'];
      poiHtml=`<div class="fiche-section-divider"><span class="fiche-section-divider-label">CHECK-LIST DESTINATION</span><div class="fiche-section-divider-title">Culture, Nature & Découvertes</div><div class="fiche-section-divider-line"></div></div>
      <div class="fiche-poi">${poiItems.slice(0,8).map((p,pi)=>{
        const clean=p.trim().replace(/^[\-\u2022\*]\s*/,'');
        const parts=clean.split(/[:\-–]/);
        const name=parts[0]?.trim()||clean;
        const desc=parts.slice(1).join('-').trim()||'';
        return `<div class="fiche-poi-card"><div class="fiche-poi-num" style="color:${poiColors[pi%poiColors.length]}">${String(pi+1).padStart(2,'0')}.</div><div class="fiche-poi-name">${E(name)}</div>${desc?`<div class="fiche-poi-desc">${E(desc)}</div>`:''}</div>`;
      }).join('')}</div>`;
    }
  }

  /* ═══ ASSEMBLE MODAL ═══ */
  document.getElementById('fiche-modal').innerHTML=`
    <div class="fiche-hero" style="background-image:url('${E(m.photo||getUnsplashUrl(country,1200,500))}')">
      <div class="fiche-hero-overlay"></div>
      <button class="fiche-close" onclick="closeFiche()">&times;</button>
      <div class="fiche-hero-content">
        <div class="fiche-hero-badge">${flagHtml} FICHE PRATIQUE DESTINATION</div>
        <div class="fiche-hero-title">Votre voyage<br><em>en ${E(country)}</em></div>
        <div class="fiche-hero-sub">${E(m.description||'La fiche technique pour les professionnels du tourisme.')}</div>
      </div>
    </div>
    <div class="fiche-essentials">${essentialsHtml}</div>
    <div class="fiche-modal-body">
      ${mosaicHtml}
      <div class="fiche-section-divider"><span class="fiche-section-divider-label">MÉMO PRO</span><div class="fiche-section-divider-title">Tout savoir pour bien vendre</div><div class="fiche-section-divider-line"></div></div>
      <div class="fiche-sections">${detailSects}</div>
      ${poiHtml}
      ${newsHtml}
    </div>`;
  document.getElementById('fiche-modal-bg').classList.add('show');
  document.body.style.overflow='hidden';
  /* Scroll modal to top */
  document.getElementById('fiche-modal-bg').scrollTop=0;
}
function closeFiche(){document.getElementById('fiche-modal-bg').classList.remove('show');document.body.style.overflow=''}

function filterDests(q){
  const fiches=modules.filter(m=>m.type==='focus');
  const results=document.getElementById('dest-results');
  const gallery=document.getElementById('dest-gallery');
  if(!q.trim()){results.style.display='none';if(gallery)gallery.style.display='';return}
  if(gallery)gallery.style.display='none';
  const filtered=fiches.filter(m=>(m.title||'').toLowerCase().includes(q.toLowerCase()));
  results.style.display='grid';
  results.innerHTML=filtered.length?filtered.map(m=>`<div class="dest-mini" style="background-image:url('${E(m.photo||'')}')" onclick="openFiche('${E(m.id)}')"><div class="dest-mini-name">${E(m.title)}</div></div>`).join(''):'<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:20px">Aucune fiche trouv\u00e9e</div>';
}

/* ══════════ AI ══════════ */
function fmtAI(t){if(!t)return'';let h=E(t);h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/^[\-•] (.+)/gm,'<li>$1</li>');h=h.replace(/(<li>.*<\/li>)/gs,m=>'<ul style="margin:6px 0 6px 16px;padding:0">'+m+'</ul>');h=h.replace(/\n{3,}/g,'\n\n');h=h.replace(/\n/g,'<br>');return h}
function renderAI(){const c=document.getElementById('ai-msgs');if(!c)return;c.innerHTML=aiMessages.map(m=>`<div class="ai-msg ${m.role}">${m.role==='bot'?fmtAI(m.text):E(m.text)}</div>`).join('')+(aiLoading?'<div class="ai-msg loading">Recherche…</div>':'');
  /* Scroll to the start of the last bot message */
  const botMsgs=c.querySelectorAll('.ai-msg.bot');
  if(botMsgs.length){const lastBot=botMsgs[botMsgs.length-1];const offset=lastBot.offsetTop-c.offsetTop;c.scrollTo({top:Math.max(0,offset-8),behavior:'smooth'})}
  else{c.scrollTop=c.scrollHeight}}
async function sendAI(){const inp=document.getElementById('ai-input'),btn=document.getElementById('ai-send-btn');if(!inp||!inp.value.trim()||aiLoading)return;const q=inp.value.trim();inp.value='';aiMessages.push({role:'user',text:q});aiLoading=true;renderAI();if(btn)btn.disabled=true;
  const apiKey=displaySettings.claudeApiKey||'';
  if(!apiKey){aiMessages.push({role:'bot',text:'⚠️ Clé API Claude non configurée. Allez dans Administration → Réglages affichage → section Assistant IA pour ajouter votre clé.'});aiLoading=false;renderAI();if(btn)btn.disabled=false;return}
  try{const msgs=aiMessages.map(m=>({role:m.role==='bot'?'assistant':'user',content:m.text}));const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:displaySettings.aiSystemPrompt||AI_SYS,messages:msgs})});if(!r.ok){const err=await r.json().catch(()=>({}));throw new Error(err.error?.message||'Erreur API '+r.status)}const data=await r.json();const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n')||'Erreur.';aiMessages.push({role:'bot',text:txt})}catch(e){aiMessages.push({role:'bot',text:'Erreur : '+e.message})}
  aiLoading=false;renderAI();if(btn)btn.disabled=false;inp.focus()}

/* ══════════ UTILS ══════════ */
function E(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function autoResizeIframe(iframe){
  const maxH=parseInt(iframe.dataset.maxheight)||800;
  iframe.style.height='300px';
  function resize(){try{const h=iframe.contentDocument.documentElement.scrollHeight;if(h>50)iframe.style.height=Math.min(h,maxH)+'px'}catch(e){}}
  resize();
  [300,800,1500,3000].forEach(t=>setTimeout(resize,t));
  /* ResizeObserver with cap */
  try{const obs=new ResizeObserver(()=>{resize()});obs.observe(iframe.contentDocument.documentElement)}catch(e){}
}

/* ══════════ IFRAME RESIZE (pour l'embed sur site web) ══════════ */
function notifyParentResize(){
  try{
    /* Calculate total content height — no capping, let parent scroll */
    const body=document.body;
    const html=document.documentElement;
    const h=Math.max(body.scrollHeight,body.offsetHeight,html.scrollHeight,html.offsetHeight);
    if(window.parent!==window){
      window.parent.postMessage({type:'tourmag-resize',height:h},'*');
    }
  }catch(e){}
}
/* Notify on any layout change */
const _resizeObs=new ResizeObserver(()=>{requestAnimationFrame(notifyParentResize)});
_resizeObs.observe(document.documentElement);
setInterval(notifyParentResize,1500);
/* Also notify after tab switches */
window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='tourmag-scroll-to'){
    /* Parent can ask us to scroll to a position */
    window.scrollTo({top:e.data.y||0,behavior:'smooth'});
  }
});
/* Open fiche modal via postMessage — breaks out of iframe */
function requestParentModal(html){
  if(window.parent!==window){
    window.parent.postMessage({type:'tourmag-fiche-modal',html:html},'*');
  }
}

/* ══════════ INIT ══════════ */
async function init(){buildSidebar();initFS()}
init();
</script>
