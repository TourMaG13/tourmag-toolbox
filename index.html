function initFS(){

/* ══════════ TYPOGRAPHY CASCADE: module → tab → global → fallback ══════════ */
function getTypo(m){
  const to=(displaySettings.tabOverrides||{})[activeTab]||{};
  const tf=m.titleFont||to.titleFont||displaySettings.defaultTitleFont||'';
  const fontBase=(f)=>f?`font-family:'${f}',sans-serif;`:'';
  const sizeBase=(s)=>s?`font-size:${s}px;`:'';
  /* Block title */
  const btf=tf; const bts=m.blockTitleSize||to.blockTitleSize||displaySettings.defaultBlockTitleSize||m.titleSize||to.titleSize||displaySettings.defaultTitleSize||'';
  /* Block subtitle */
  const bsf=m.textFont||to.textFont||displaySettings.defaultTextFont||'';
  const bss=m.blockSubtitleSize||to.blockSubtitleSize||displaySettings.defaultBlockSubtitleSize||'';
  /* Block description */
  const bdf=bsf; const bds=m.blockDescSize||to.blockDescSize||displaySettings.defaultBlockDescSize||m.textSize||to.textSize||displaySettings.defaultTextSize||'';
  /* Article title */
  const atf=bsf; const ats=m.articleTitleSize||to.articleTitleSize||displaySettings.defaultArticleTitleSize||'';
  /* Article description (chapô) */
  const adf=bsf; const ads=m.articleDescSize||to.articleDescSize||displaySettings.defaultArticleDescSize||'';
  /* Expert-specific typography */
  const isExpert=(m.type==='expert'||m.type==='experts');
  const expTf=isExpert?(m.titleFont||displaySettings.defaultExpertTitleFont||tf):tf;
  const expTextF=isExpert?(m.textFont||displaySettings.defaultExpertTextFont||bsf):bsf;
  const expNameSz=isExpert?(displaySettings.defaultExpertNameSize||''):'';
  const expTitleSz=isExpert?(displaySettings.defaultExpertTitleSize||bts):bts;
  const expArtTitleSz=isExpert?(displaySettings.defaultExpertArticleTitleSize||ats):ats;
  const expArtDescSz=isExpert?(displaySettings.defaultExpertArticleDescSize||ads):ads;
  return{
    titleStyle:fontBase(isExpert?expTf:btf)+sizeBase(isExpert?expTitleSz:bts),
    subtitleStyle:fontBase(bsf)+sizeBase(bss),
    descStyle:fontBase(isExpert?expTextF:bdf)+sizeBase(isExpert?expTitleSz:bds),
    artTitleStyle:fontBase(isExpert?expTextF:atf)+sizeBase(isExpert?expArtTitleSz:ats),
    artDescStyle:fontBase(isExpert?expTextF:adf)+sizeBase(isExpert?expArtDescSz:ads),
    expertNameStyle:fontBase(expTf)+sizeBase(expNameSz),
    /* legacy compat */
    textStyle:fontBase(bsf)+sizeBase(bds),
    titleFont:tf,titleSize:bts,textFont:bsf,textSize:bds
  };
}
function getTabAccent(){
  const to=(displaySettings.tabOverrides||{})[activeTab]||{};
  return to.accent||displaySettings.defaultAccent||'';
}

/* ══════════ RENDER ══════════ */
function getFiltered(){
  if(activeTab==='dashboard'){return modules.filter(m=>{
    if(m.active===false)return false;
    const cats=m.categories||[m.category];
    return cats.includes('dashboard');
  })}
  return modules.filter(m=>{ 
    if(m.active===false)return false;
    const cats=m.categories||[m.category];
    return cats.includes(activeTab);
  });
}
function renderGrid(){
  const g=document.getElementById('grid');
  let mods=getFiltered().sort((a,b)=>{
    const oa=(a.orders&&a.orders[activeTab]!=null)?a.orders[activeTab]:(a.order||0);
    const ob=(b.orders&&b.orders[activeTab]!=null)?b.orders[activeTab]:(b.order||0);
    return oa-ob;
  });
  if(!mods.length){g.innerHTML='<div class="empty-state">Aucun module dans cette catégorie.</div>';return}
  g.innerHTML=mods.map((m,i)=>renderCard(m,i)).join('');
  if(mods.find(m=>m.type==='ai-chat'))renderAI();
  setTimeout(renderDataviz,100);
}

/* ══════════ DATAVIZ RENDERING ══════════ */
function renderDataviz(){
  /* Animated counters */
  document.querySelectorAll('.dataviz-counter-val[data-target]').forEach(el=>{
    const target=parseFloat(el.dataset.target.replace(/[^\d.-]/g,''))||0;
    const isInt=Number.isInteger(target);
    const duration=1200;
    const start=performance.now();
    function tick(now){
      const p=Math.min((now-start)/duration,1);
      const ease=1-Math.pow(1-p,3);
      const val=target*ease;
      el.textContent=isInt?Math.round(val).toLocaleString('fr-FR'):val.toFixed(1).replace('.',',');
      if(p<1)requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
  /* Canvas charts */
  document.querySelectorAll('.dataviz-canvas[data-dvtype]').forEach(canvas=>{
    const type=canvas.dataset.dvtype;
    let data=[];
    try{data=JSON.parse(canvas.dataset.dvdata||'[]')}catch(e){}
    if(!data.length)return;
    const ctx=canvas.getContext('2d');
    const W=canvas.width=canvas.parentElement.clientWidth;
    const customH=parseInt(canvas.dataset.dvheight)||0;
    const H=canvas.height=customH||280;
    const valFontSz=parseInt(canvas.dataset.valsize)||12;
    const lblFontSz=parseInt(canvas.dataset.labelsize)||11;
    if(type==='bar')drawBarChart(ctx,data,W,H,valFontSz,lblFontSz);
    else if(type==='pie')drawPieChart(ctx,data,W,H,false);
    else if(type==='donut')drawPieChart(ctx,data,W,H,true);
  });
}

function drawBarChart(ctx,data,W,H,valFontSz,lblFontSz){
  valFontSz=valFontSz||12;lblFontSz=lblFontSz||11;
  const fmtVal=(d)=>{const v=Number.isInteger(d.value)?d.value.toString():d.value.toFixed(1).replace('.',',');return v+(d.suffix||'')};
  ctx.font='11px Outfit,sans-serif';
  const labelH=(lblFontSz+3)*Math.min(Math.ceil(Math.max(...data.map(d=>(d.label||'').length))/16),4)+10;
  const pad={top:28,right:16,bottom:Math.max(labelH,30),left:16};
  const cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  const vals=data.map(d=>d.value);
  const maxVal=Math.max(...vals,0)||1;
  const minVal=Math.min(...vals,0);
  const range=maxVal-minVal||1;
  const zeroY=pad.top+(maxVal/range)*ch;
  const barW=Math.min(cw/data.length*.6,65);
  const gap=(cw-barW*data.length)/(data.length+1);
  data.forEach((d,i)=>{
    const x=pad.left+gap+(barW+gap)*i;
    const barH=Math.abs(d.value/range)*ch;
    const isNeg=d.value<0;
    const y=isNeg?zeroY:zeroY-barH;
    const r=Math.min(barW/2,6);
    ctx.fillStyle=d.color||'#0891B2';
    ctx.beginPath();
    if(isNeg){ctx.moveTo(x,y);ctx.lineTo(x+barW,y);ctx.lineTo(x+barW,y+barH-r);ctx.quadraticCurveTo(x+barW,y+barH,x+barW-r,y+barH);ctx.lineTo(x+r,y+barH);ctx.quadraticCurveTo(x,y+barH,x,y+barH-r);ctx.closePath()}
    else{ctx.moveTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.lineTo(x+barW-r,y);ctx.quadraticCurveTo(x+barW,y,x+barW,y+r);ctx.lineTo(x+barW,y+barH);ctx.lineTo(x,y+barH);ctx.closePath()}
    ctx.fill();
    ctx.fillStyle='#1A2332';ctx.font=`bold ${valFontSz}px Outfit,sans-serif`;ctx.textAlign='center';
    const valStr=fmtVal(d);
    if(isNeg){ctx.textBaseline='bottom';ctx.fillText(valStr,x+barW/2,zeroY-4)}
    else{ctx.textBaseline='bottom';ctx.fillText(valStr,x+barW/2,y-4)}
    ctx.fillStyle='#475569';ctx.font=`${lblFontSz}px Outfit,sans-serif`;ctx.textAlign='center';ctx.textBaseline='top';
    const lbl=d.label||'';const maxLblW=barW+gap-4;const ly=H-pad.bottom+6;
    const words=lbl.split(/\s+/);let line='';let lineY=ly;
    words.forEach((w,wi)=>{
      const test=line?line+' '+w:w;
      if(ctx.measureText(test).width>maxLblW&&line){ctx.fillText(line,x+barW/2,lineY);lineY+=lblFontSz+3;line=w}
      else{line=test}
    });
    if(line)ctx.fillText(line,x+barW/2,lineY);
  });
  ctx.strokeStyle='#CBD5E1';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.left,zeroY);ctx.lineTo(W-pad.right,zeroY);ctx.stroke();
}
function drawPieChart(ctx,data,W,H,isDonut){
  const cx=W/2,cy=H/2-10,r=Math.min(cx,cy)-20;
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  let angle=-Math.PI/2;
  data.forEach(d=>{
    const slice=(d.value/total)*Math.PI*2;
    ctx.fillStyle=d.color||'#0891B2';
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();ctx.fill();
    /* Label */
    const mid=angle+slice/2;
    const lx=cx+Math.cos(mid)*(r*0.65);
    const ly=cy+Math.sin(mid)*(r*0.65);
    ctx.fillStyle='#fff';ctx.font='bold 11px Outfit,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    if(slice>0.3)ctx.fillText(d.label.substring(0,10),lx,ly);
    angle+=slice;
  });
  if(isDonut){
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx,cy,r*0.5,0,Math.PI*2);ctx.fill();
    /* Center total */
    ctx.fillStyle='#1A2332';ctx.font='bold 22px Outfit,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(total.toLocaleString('fr-FR'),cx,cy);
  }
  /* Legend below — wraps to multiple lines if needed */
  ctx.font='11px Outfit,sans-serif';ctx.textBaseline='top';
  let lx=10,ly=H-16;const lineH=16;const maxW=W-20;
  data.forEach(d=>{
    const txt=`${d.label} (${d.value}${d.suffix||''})`;
    const tw=ctx.measureText(txt).width+28;
    if(lx+tw>maxW&&lx>10){lx=10;ly-=lineH}
    ctx.fillStyle=d.color||'#0891B2';ctx.fillRect(lx,ly,10,10);
    ctx.fillStyle='#475569';ctx.textAlign='left';ctx.fillText(txt,lx+14,ly);
    lx+=tw;
  });
}

      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',

    <div class="card-body" style="background:linear-gradient(180deg,#FDFBF7 0%,#FFF 100%)"><div class="fiche-carnet-header"><div class="fiche-carnet-flag" style="width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg></div><div><div class="fiche-carnet-title" style="${ty.titleStyle}">${E(m.title)}</div><div class="fiche-carnet-sub">FICHE PRATIQUE DESTINATION</div></div></div><div class="card-desc" style="margin-bottom:14px;${ty.descStyle};font-style:italic;color:#78716C">${E(m.description||'')}</div>${sects?`<div class="fiche-grid">${sects}</div>`:''}</div></div>`}
  if(m.type==='crisis'){const bars=[35,55,70,60,80,65,45,75,90,70,55,40];return`<div class="card ${wClass}${nb} clickable" onclick="window.open('${E(m.url)}','_blank')" style="animation-delay:${d}s${bh}">${m.badge?`<div class="card-badge" style="background:${m.accent||'#DC2626'}">${E(m.badge)}</div>`:''}${imgTag}
    <div class="card-body"><div class="card-cat" style="color:${m.accent||'#DC2626'};${ty.subtitleStyle}">${E(m.subtitle||'')}</div><div class="card-title" style="${ty.titleStyle}">${E(m.title)}</div><div class="card-desc" style="${ty.descStyle}">${E(m.description||'')}</div>
    <div class="crisis-viz"><div class="crisis-stat"><div class="crisis-stat-val">7</div><div class="crisis-stat-label">Pays en alerte MAE</div></div><div class="crisis-stat"><div class="crisis-stat-val">-18%</div><div class="crisis-stat-label">Réservations zone</div></div><div class="crisis-sparkline">${bars.map(h=>`<div class="spark-bar" style="height:${h}%"></div>`).join('')}</div></div><div class="card-arrow">${IC.arrow}</div></div></div>`}
  if(m.type==='kpi')return`<div class="card ${wClass}${nb} clickable" onclick="window.open('${E(m.url)}','_blank')" style="animation-delay:${d}s${bh}">${imgTag}
    <div class="card-body"><div class="card-cat" style="color:${m.accent||'#2563EB'};${ty.subtitleStyle}">${E(m.subtitle||'')}</div><div class="card-title" style="${ty.titleStyle}">${E(m.title)}</div><div class="card-desc" style="${ty.descStyle}">${E(m.description||'')}</div>
    <div class="kpi-row"><div class="kpi-val" style="color:${m.accent||'#2563EB'}">${E(m.kpiValue||'')}</div><div><div class="kpi-label">${E(m.kpiLabel||'')}</div></div><div class="kpi-trend" style="color:${m.trendDirection==='down'?'#DC2626':m.trendDirection==='flat'?'#94A3B8':'#059669'}">${m.trendDirection==='down'?IC.trendDown:m.trendDirection==='flat'?IC.trendFlat:IC.trendUp}</div></div><div class="card-arrow">${IC.arrow}</div></div></div>`;
  if(m.type==='rubrique'){
    const style=m.rubriqueStyle||displaySettings.defaultRubriqueStyle||'list';
    const maxA=m.rubArticleCount??displaySettings.defaultRubArticleCount??6;
    const artImgSz=m.rubArticleImgSize??displaySettings.defaultRubArticleImgSize??100;
    const gridImgH=m.rubGridImgHeight??displaySettings.defaultRubGridImgHeight??100;
    const featUrl=m.featuredArticleUrl||'';
    const featImgH=m.featuredImgHeight||displaySettings.defaultFeaturedImgHeight||160;
    const rawArts=(m.articles||[]).slice(0,maxA);
    /* Deduplicate: remove featured article from list */
    const allArts=featUrl?rawArts.filter(a=>a.url!==featUrl):rawArts;
    const ac=m.accent||'#475569';
    const artTxtSt=ty.artTitleStyle;
    const artDescSt=ty.artDescStyle;
    /* Featured article rendering for rubrique */
    let rubFeatHtml='';
    const showDesc=m.showArticleDesc!==false;
    const showFeatDesc=m.showFeatDesc!==false;
    if(m.featuredArticleTitle&&(style==='magazine'||style==='featured-list')){
      rubFeatHtml=`<a class="expert-featured-wrap" href="${E(featUrl||'#')}" target="_blank" style="display:block;text-decoration:none;color:inherit;margin-bottom:10px;border-color:${ac}">${m.featuredArticleImg?`<img class="expert-featured-img" src="${E(m.featuredArticleImg)}" style="height:${featImgH}px" onerror="this.style.display='none'">`:''}\n      <div class="expert-featured-body"><div class="expert-featured-title" style="color:${ac};${m.featTitleSize?'font-size:'+m.featTitleSize+'px':ty.titleStyle}">${E(m.featuredArticleTitle)}</div>${(showFeatDesc&&m.featuredArticleDesc)?`<div class="expert-featured-desc" style="${m.featDescSize?'font-size:'+m.featDescSize+'px':artDescSt}">${E(m.featuredArticleDesc)}</div>`:''}</div></a>`;
    }
    const hasFeat=!!rubFeatHtml;
    const cols=m.rubMagazineCols||2;
    let artsHtml='';
    if(style==='grid'||style==='mosaic'){
      /* If featured set, prepend it as a spanning grid item */
      let gridFeatHtml='';
      if(m.featuredArticleTitle){
        gridFeatHtml=`<a href="${E(featUrl||'#')}" target="_blank" style="grid-column:1/-1;text-decoration:none;color:inherit;border-radius:var(--radius-xs);overflow:hidden;background:var(--border-light)">${m.featuredArticleImg?`<img src="${E(m.featuredArticleImg)}" style="width:100%;height:${featImgH}px;object-fit:cover;display:block" onerror="this.style.display='none'">`:''}
        <div style="padding:12px 14px"><div style="font-weight:700;color:${ac};line-height:1.3;${m.featTitleSize?'font-size:'+m.featTitleSize+'px':ty.titleStyle}">${E(m.featuredArticleTitle)}</div>${(showFeatDesc&&m.featuredArticleDesc)?`<div style="color:var(--text-body);margin-top:4px;line-height:1.5;${m.featDescSize?'font-size:'+m.featDescSize+'px':''}">${E(m.featuredArticleDesc)}</div>`:''}</div></a>`;
      }
      artsHtml=`<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:10px;margin-top:14px">${gridFeatHtml}${allArts.map(a=>`<a href="${E(a.url)}" target="_blank" style="text-decoration:none;color:inherit;border-radius:var(--radius-xs);overflow:hidden;background:var(--border-light);transition:all .2s"><div style="position:relative">${a.image?`<img src="${E(a.image)}" style="width:100%;height:${gridImgH}px;object-fit:cover;display:block" onerror="this.style.display='none'">`:`<div style="height:${gridImgH}px;background:linear-gradient(135deg,${ac}22,${ac}44);display:flex;align-items:center;justify-content:center"><span style="font-size:24px">📄</span></div>`}</div><div style="padding:10px 12px"><div style="font-weight:600;line-height:1.3;${artTxtSt}">${E(a.title)}</div>${(showDesc&&a.description)?`<div style="color:var(--text-muted);margin-top:4px;line-height:1.4;${artDescSt}">${E(a.description.substring(0,80))}…</div>`:''}</div></a>`).join('')}</div>`;
    } else if(style==='carousel'){
      artsHtml=`<div class="rub-carousel">${allArts.map(a=>`<a class="rub-carousel-item" href="${E(a.url)}" target="_blank">${a.image?`<img class="rub-carousel-img" src="${E(a.image)}" style="height:${gridImgH}px" onerror="this.style.display='none'">`:''}<div class="rub-carousel-title" style="${artTxtSt}">${E(a.title)}</div></a>`).join('')}</div>`;
    } else if((style==='magazine'||style==='featured-list')&&(hasFeat||allArts.length)){
      let magFeat='',magRest=allArts;
      if(!hasFeat&&allArts.length){
        const f=allArts[0];magRest=allArts.slice(1);
        magFeat=`<a href="${E(f.url)}" target="_blank" style="display:block;text-decoration:none;color:inherit;margin-bottom:12px;border-radius:var(--radius-xs);overflow:hidden;border:1px solid ${ac};background:var(--accent-light)">${f.image?`<img src="${E(f.image)}" style="width:100%;height:${featImgH}px;object-fit:cover;display:block" onerror="this.style.display='none'">`:''}
        <div style="padding:12px 14px"><div style="font-weight:700;color:${ac};line-height:1.3;${m.featTitleSize?'font-size:'+m.featTitleSize+'px':''}">${E(f.title)}</div>${(showFeatDesc&&f.description)?`<div style="color:var(--text-body);margin-top:4px;line-height:1.5;${m.featDescSize?'font-size:'+m.featDescSize+'px':''}">${E(f.description)}</div>`:''}</div></a>`;
      }
      const magGrid=magRest.length?`<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:10px">${magRest.map(a=>`<a href="${E(a.url)}" target="_blank" style="text-decoration:none;color:inherit;display:flex;gap:8px;align-items:flex-start;padding:8px;background:var(--border-light);border-radius:var(--radius-xs)">${a.image?`<img src="${E(a.image)}" style="width:${artImgSz}px;height:${Math.round(artImgSz*0.75)}px;object-fit:cover;border-radius:6px;flex-shrink:0" onerror="this.style.display='none'">`:''}
      <div><div style="font-weight:500;line-height:1.3;${artTxtSt}">${E(a.title)}</div>${(showDesc&&a.description)?`<div style="color:var(--text-muted);margin-top:3px;line-height:1.4;${artDescSt}">${E(a.description.substring(0,100))}</div>`:''}</div></a>`).join('')}</div>`:'';
      artsHtml=`<div style="margin-top:14px">${magFeat}${magGrid}</div>`;
    } else if(style==='cards-wide'){
      artsHtml=`<div style="margin-top:14px;display:flex;flex-direction:column;gap:12px">${allArts.map(a=>`<a href="${E(a.url)}" target="_blank" style="text-decoration:none;color:inherit;display:flex;gap:16px;align-items:flex-start;padding:14px;background:var(--border-light);border-radius:var(--radius-xs);transition:all .2s">${a.image?`<img src="${E(a.image)}" style="width:${artImgSz+40}px;height:${Math.round((artImgSz+40)*0.65)}px;object-fit:cover;border-radius:8px;flex-shrink:0" onerror="this.style.display='none'">`:''}
      <div><div style="font-weight:600;line-height:1.3;${artTxtSt}">${E(a.title)}</div>${(showDesc&&a.description)?`<div style="color:var(--text-muted);margin-top:4px;line-height:1.45;${artDescSt}">${E(a.description)}</div>`:''}</div></a>`).join('')}</div>`;
    } else {
      artsHtml=`<div class="rubrique-articles">${allArts.map(a=>`<div class="rubrique-link" onclick="window.open('${E(a.url)}','_blank')">${a.image?`<img class="rubrique-link-img" src="${E(a.image)}" style="width:${artImgSz}px;height:${Math.round(artImgSz*0.75)}px" onerror="this.style.display='none'">`:''}<div class="rubrique-link-text" style="${artTxtSt}">${E(a.title)}</div></div>`).join('')}</div>`;

    }
    return`<div class="card ${wClass}${nb}" style="animation-delay:${d}s${bh}">${imgTag}
    <div class="card-body"><div class="card-cat" style="color:${ac};${ty.subtitleStyle}">${E(m.subtitle||'')}</div><div class="card-title" style="${ty.titleStyle}">${E(m.title)}</div><div class="card-desc" style="${ty.descStyle}">${E(m.description||'')}</div>${rubFeatHtml}${artsHtml}${m.url?`<div class="card-arrow" onclick="window.open('${E(m.url)}','_blank')">${IC.arrow}</div>`:''}</div></div>`}
  if(m.type==='link-all')return`<div class="card ${wClass}${nb} link-all-card clickable" onclick="window.open('${E(m.url)}','_blank')" style="animation-delay:${d}s${bh}"><div class="link-all-inner">${IC.arrow} <span>${E(m.title)}</span></div></div>`;
  /* Dataviz module */
  if(m.type==='dataviz'){
    const dvId='dv-'+m.id;
    let dvInner='';
    if(m.datavizType==='counter'){
      dvInner=`<div class="dataviz-counter"><div><span class="dataviz-counter-val" id="${dvId}" data-target="${E(m.counterValue||'0')}" style="color:${m.accent||'#0891B2'};${m.dvValSize?'font-size:'+m.dvValSize+'px':''}">0</span><span class="dataviz-counter-suffix" style="color:${m.accent||'#0891B2'};${m.dvValSize?'font-size:'+Math.round(m.dvValSize*0.6)+'px':''}">${E(m.counterSuffix||'')}</span></div><div class="dataviz-counter-label" style="${m.dvLabelSize?'font-size:'+m.dvLabelSize+'px':''}">${E(m.counterLabel||'')}</div></div>`;
    } else {
      dvInner=`<canvas id="${dvId}" class="dataviz-canvas" data-dvtype="${m.datavizType}" data-dvdata='${JSON.stringify(m.datavizData||[])}' data-valsize="${m.dvValSize||''}" data-labelsize="${m.dvLabelSize||''}" data-dvheight="${m.dvHeight||''}" ></canvas>`;
    }
    return`<div class="card ${wClass}${nb} ${m.url?'clickable':''}" ${m.url?`onclick="window.open('${E(m.url)}','_blank')"`:''} style="animation-delay:${d}s${bh}">${imgTag}
    <div class="card-body"><div class="card-cat" style="color:${m.accent||'#0891B2'};${ty.subtitleStyle}">${E(m.subtitle||'')}</div><div class="card-title" style="${ty.titleStyle}">${E(m.title)}</div><div class="card-desc" style="${ty.descStyle}">${E(m.description||'')}</div><div class="dataviz-wrap">${dvInner}</div>${m.url?`<div class="card-arrow">${IC.arrow}</div>`:''}</div></div>`}
  /* Expert module (from RSS or manual) */
  if(m.type==='expert'||m.type==='experts'){
    const maxArts=m.maxArticles??displaySettings.defaultArticleCount??3;
    const imgSz=m.articleImgSize??displaySettings.defaultArticleImgSize??72;
    const showImg=m.showArticleImg!==false;
    const allArts=m.articles||[];
    const featUrl=m.featuredArticleUrl||'';
    const featImgH=m.featuredImgHeight||displaySettings.defaultFeaturedImgHeight||160;
    const style=m.expertStyle||displaySettings.defaultExpertStyle||'classic';
    const eName=m.expertName||m.title||'';
    const eRole=m.expertRole||m.subtitle||'';
    const ePhoto=m.expertPhoto||m.photo||'';
    const ePage=m.expertPage||m.url||'';
    const avatarHtml=ePhoto?`<img src="${E(ePhoto)}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.textContent='${eName.charAt(0)}'">`:`${eName.charAt(0)}`;
    /* Featured article */
    let featHtml='';
    if(m.featuredArticleTitle){
      featHtml=`<a class="expert-featured-wrap" href="${E(featUrl||'#')}" target="_blank" style="display:block;text-decoration:none;color:inherit">${m.featuredArticleImg?`<img class="expert-featured-img" src="${E(m.featuredArticleImg)}" style="height:${featImgH}px" onerror="this.style.display='none'">`:''}
      <div class="expert-featured-body"><div class="expert-featured-title">${E(m.featuredArticleTitle)}</div>${m.featuredArticleDesc?`<div class="expert-featured-desc">${E(m.featuredArticleDesc)}</div>`:''}</div></a>`;
    }
    /* Articles excluding featured */
    const visibleArts=allArts.filter(a=>a.url!==featUrl).slice(0,maxArts);
    const artsHtml=visibleArts.map(a=>`<a class="expert-article" href="${E(a.url)}" target="_blank">${showImg?(a.image?`<img class="expert-article-img" src="${E(a.image)}" style="width:${imgSz}px;height:${Math.round(imgSz*0.75)}px" onerror="this.style.display='none'">`:`<div class="expert-article-img" style="width:${imgSz}px;height:${Math.round(imgSz*0.75)}px"></div>`):''}<div class="expert-article-title" style="${ty.artTitleStyle}">${E(a.title)}</div></a>`).join('');
    const linkAll=ePage?`<a class="expert-all-link" href="${E(ePage)}" target="_blank">${IC.arrow} Tous ses articles</a>`:'';
    /* Style variants */
    if(style==='card-h'){
      return`<div class="card ${wClass}${nb}" style="animation-delay:${d}s${bh}"><div class="card-body" style="display:flex;gap:18px;align-items:flex-start">${ePhoto?`<img src="${E(ePhoto)}" style="width:90px;height:90px;border-radius:50%;object-fit:cover;flex-shrink:0;border:3px solid var(--border)" onerror="this.style.display='none'">`:''}
      <div style="flex:1"><div class="expert-name" style="${ty.titleStyle}">${E(eName)}</div><div class="expert-role">${E(eRole)}</div>${featHtml}<div class="expert-articles" style="margin-top:8px">${artsHtml}</div>${linkAll}</div></div></div>`}
    if(style==='minimal'){
      return`<div class="card ${wClass}${nb}" style="animation-delay:${d}s${bh}"><div class="card-body"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div class="expert-avatar" style="width:36px;height:36px;font-size:14px">${avatarHtml}</div><div><span class="expert-name" style="font-size:14px">${E(eName)}</span> <span class="expert-role">${E(eRole)}</span></div></div>
      <div class="expert-articles">${visibleArts.map(a=>`<a class="expert-article" href="${E(a.url)}" target="_blank" style="padding:6px 10px"><div class="expert-article-title" style="${ty.artTitleStyle}">${E(a.title)}</div></a>`).join('')}</div>${linkAll}</div></div>`}
    if(style==='banner'){
      return`<div class="card ${wClass}${nb}" style="animation-delay:${d}s${bh}">${ePhoto?`<div style="height:120px;background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,.6)),url('${E(ePhoto)}') center/cover;display:flex;align-items:flex-end;padding:16px"><div><div style="color:#fff;font-size:18px;font-weight:700">${E(eName)}</div><div style="color:rgba(255,255,255,.7);font-size:12px">${E(eRole)}</div></div></div>`:''}
      <div class="card-body">${featHtml}<div class="expert-articles">${artsHtml}</div>${linkAll}</div></div>`}
    if(style==='magazine'){
      return`<div class="card ${wClass}${nb}" style="animation-delay:${d}s${bh}"><div class="card-body" style="display:grid;grid-template-columns:180px 1fr;gap:20px;align-items:start">${ePhoto?`<div><img src="${E(ePhoto)}" style="width:180px;height:220px;object-fit:cover;border-radius:var(--radius-xs)" onerror="this.parentElement.style.display='none'"><div class="expert-name" style="margin-top:8px">${E(eName)}</div><div class="expert-role">${E(eRole)}</div></div>`:'<div></div>'}
      <div>${featHtml}<div class="expert-articles">${artsHtml}</div>${linkAll}</div></div></div>`}
    if(style==='timeline'){
      const timeArts=visibleArts.map(a=>{const dt=a.date?new Date(a.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}):'';return`<div style="display:flex;gap:12px;align-items:flex-start;position:relative;padding-left:20px;border-left:2px solid ${m.accent||'var(--accent)'};margin-left:6px;padding-bottom:14px"><div style="position:absolute;left:-6px;top:2px;width:10px;height:10px;border-radius:50%;background:${m.accent||'var(--accent)'};border:2px solid var(--bg-card)"></div><div>${dt?`<div style="font-size:10px;color:var(--text-muted);font-weight:600;margin-bottom:2px">${dt}</div>`:''}<a href="${E(a.url)}" target="_blank" style="font-size:13px;font-weight:500;text-decoration:none;color:var(--text-dark)">${E(a.title)}</a></div></div>`}).join('');
      return`<div class="card ${wClass}${nb}" style="animation-delay:${d}s${bh}"><div class="card-body"><div class="expert-header"><div class="expert-avatar">${avatarHtml}</div><div><div class="expert-name">${E(eName)}</div><div class="expert-role">${E(eRole)}</div></div></div>${featHtml}<div style="margin-top:14px">${timeArts}</div>${linkAll}</div></div>`}
    if(style==='quote'){
      const firstArt=visibleArts[0];
      const quoteText=firstArt?.description||firstArt?.title||'';
      return`<div class="card ${wClass}${nb}" style="animation-delay:${d}s${bh}"><div class="card-body"><div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><div class="expert-avatar">${avatarHtml}</div><div><div class="expert-name">${E(eName)}</div><div class="expert-role">${E(eRole)}</div></div></div>
      <blockquote style="margin:0 0 14px;padding:16px 20px;background:var(--border-light);border-radius:var(--radius-xs);border-left:3px solid ${m.accent||'var(--accent)'};font-style:italic;font-size:14px;line-height:1.6;color:var(--text-body)">${E(quoteText)}</blockquote>
      ${featHtml}<div class="expert-articles">${artsHtml}</div>${linkAll}</div></div>`}
    /* Default: classic */
    return`<div class="card ${wClass}${nb}" style="animation-delay:${d}s${bh}"><div class="card-body"><div class="expert-block"><div class="expert-header"><div class="expert-avatar">${avatarHtml}</div><div><div class="expert-name" style="${ty.titleStyle}">${E(eName)}</div><div class="expert-role">${E(eRole)}</div></div></div>${featHtml}<div class="expert-articles">${artsHtml}</div>${linkAll}</div></div></div>`}
  /* HTML embed module — renders inside iframe so scripts execute */
  if(m.type==='htmlEmbed'){
    const iframeId='embed-'+m.id;
    const srcdoc=(m.htmlContent||'').replace(/"/g,'&quot;');
    return`<div class="card ${wClass}${nb}" style="animation-delay:${d}s${bh}">${m.badge?`<div class="card-badge" style="background:${m.accent||'#0891B2'}">${E(m.badge)}</div>`:''}
    <div class="card-body"><div class="card-cat" style="color:${m.accent||'#0891B2'};${ty.subtitleStyle}">${E(m.subtitle||'')}</div>${m.title?`<div class="card-title" style="${ty.titleStyle}">${E(m.title)}</div>`:''}<div class="html-embed-wrap"><iframe id="${iframeId}" srcdoc="${srcdoc}" style="width:100%;border:none;border-radius:var(--radius-xs);overflow:hidden" onload="autoResizeIframe(this)" scrolling="no"></iframe></div></div></div>`}
  return`<div class="card ${wClass}${nb} ${m.url?'clickable':''}" ${m.url?`onclick="window.open('${E(m.url)}','_blank')"`:''} style="animation-delay:${d}s${bh}">${m.badge?`<div class="card-badge" style="background:${m.accent||'#0891B2'}">${E(m.badge)}</div>`:''}${imgTag}
    <div class="card-body"><div class="card-cat" style="color:${m.accent||'#0891B2'};${ty.subtitleStyle}">${E(m.subtitle||'')}</div><div class="card-title" style="${ty.titleStyle}">${E(m.title)}</div><div class="card-desc" style="${ty.descStyle}">${E(m.description||'')}</div>${m.url?`<div class="card-arrow">${IC.arrow}</div>`:''}</div></div>`}

/* ══════════ AI ══════════ */
function fmtAI(t){if(!t)return'';let h=E(t);h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/^[\-•] (.+)/gm,'<li>$1</li>');h=h.replace(/(<li>.*<\/li>)/gs,m=>'<ul style="margin:6px 0 6px 16px;padding:0">'+m+'</ul>');h=h.replace(/\n{3,}/g,'\n\n');h=h.replace(/\n/g,'<br>');return h}
function renderAI(){const c=document.getElementById('ai-msgs');if(!c)return;c.innerHTML=aiMessages.map(m=>`<div class="ai-msg ${m.role}">${m.role==='bot'?fmtAI(m.text):E(m.text)}</div>`).join('')+(aiLoading?'<div class="ai-msg loading">Recherche…</div>':'');c.scrollTop=c.scrollHeight}
async function sendAI(){const inp=document.getElementById('ai-input'),btn=document.getElementById('ai-send-btn');if(!inp||!inp.value.trim()||aiLoading)return;const q=inp.value.trim();inp.value='';aiMessages.push({role:'user',text:q});aiLoading=true;renderAI();if(btn)btn.disabled=true;
  const apiKey=displaySettings.claudeApiKey||'';
  if(!apiKey){aiMessages.push({role:'bot',text:'⚠️ Clé API Claude non configurée. Allez dans Administration → Réglages affichage → section Assistant IA pour ajouter votre clé.'});aiLoading=false;renderAI();if(btn)btn.disabled=false;return}
  try{const msgs=aiMessages.map(m=>({role:m.role==='bot'?'assistant':'user',content:m.text}));const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:displaySettings.aiSystemPrompt||AI_SYS,messages:msgs})});if(!r.ok){const err=await r.json().catch(()=>({}));throw new Error(err.error?.message||'Erreur API '+r.status)}const data=await r.json();const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n')||'Erreur.';aiMessages.push({role:'bot',text:txt})}catch(e){aiMessages.push({role:'bot',text:'Erreur : '+e.message})}
  aiLoading=false;renderAI();if(btn)btn.disabled=false;inp.focus()}

/* ══════════ UTILS ══════════ */
function E(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function autoResizeIframe(iframe){
  /* Start with generous initial height to avoid half-display */
  iframe.style.height='400px';
  function resize(){try{const h=iframe.contentDocument.documentElement.scrollHeight;if(h>50)iframe.style.height=h+'px'}catch(e){}}
  /* Resize at multiple intervals to catch async content (Firebase, scripts) */
  resize();
  [300,800,1500,3000,5000,8000].forEach(t=>setTimeout(resize,t));
  /* Also listen for resize events inside the iframe */
  try{const obs=new ResizeObserver(resize);obs.observe(iframe.contentDocument.documentElement)}catch(e){}
}

/* ══════════ IFRAME RESIZE (pour l'embed sur site web) ══════════ */
function notifyParentResize(){
  try{
    const h=document.documentElement.scrollHeight;
    if(window.parent!==window){
      window.parent.postMessage({type:'tourmag-resize',height:h},'*');
    }
  }catch(e){}
}
const _resizeObs=new ResizeObserver(notifyParentResize);
_resizeObs.observe(document.documentElement);
setInterval(notifyParentResize,2000);

/* ══════════ INIT ══════════ */
async function init(){buildSidebar();initFS()}
init();
</script>
